services:
  browser-e2e:
    image: wasm-browser-e2e:local
    build:
      context: .
      dockerfile: client/Dockerfile
    working_dir: /workspace/client
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CI=1
      - TEST_PACKAGE_COUNT=${TEST_PACKAGE_COUNT:-100}
      - TEST_WS_ADDR=${TEST_WS_ADDR:-host.docker.internal:19001}
    command: ["npm", "run", "test:e2e"]
