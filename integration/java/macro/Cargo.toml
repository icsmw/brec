[package]
name        = "brec_in_java_gen_macro"
version     = "0.1.0"
edition     = "2024"
authors     = ["d.astafyev@outlook.com"]
description = "Proc-macro derives for Brec Java/JNI conversion types."
license     = "Apache-2.0"
resolver    = "2"
repository  = "https://github.com/icsmw/brec.git"
homepage    = "https://icsmw.github.io/brec/integrations/java/"
readme      = "README.md"

keywords = ["brec", "java", "jni", "derive", "proc-macro"]

categories = ["development-tools::procedural-macro-helpers", "encoding"]

[lib]
proc-macro = true

[dependencies]
syn.workspace         = true
quote.workspace       = true
proc-macro2.workspace = true
brec_in_java_gen      = { workspace = true }
