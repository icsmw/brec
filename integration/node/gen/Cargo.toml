[package]
name        = "brec_in_node_gen"
version     = "0.1.0"
edition     = "2024"
authors     = ["d.astafyev@outlook.com"]
description = "Brec integration with NodeJs"
license     = "Apache-2.0"
repository  = "https://github.com/icsmw/brec.git"
homepage    = "https://github.com/icsmw/brec"
readme      = "README.md"

keywords = ["binary", "packet", "storage", "logging", "streaming"]

categories = [
    "encoding",
    "data-structures",
    "filesystem",
    "development-tools",
    "parser-implementations",
]

[lib]
path = "src/lib.rs"

[dependencies]
syn.workspace          = true
quote.workspace        = true
proc-macro2.workspace  = true
enum_ids.workspace     = true
brec_common.workspace  = true
brec_gen_tys.workspace = true
